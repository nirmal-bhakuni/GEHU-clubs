services:
  - type: web
    name: gehu-clubs
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: DISABLE_AUTO_SEED
        value: "true"
      - key: DISABLE_EMAIL_NOTIFICATIONS
        value: "true"
      - key: EVENT_REMINDER_DAYS
        value: "3"
      - key: EVENT_REMINDER_INTERVAL_HOURS
        value: "6"
      - key: EMAIL_BATCH_SIZE
        value: "50"
      - key: SMTP_URL
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
